<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VideoForge — Call Sheet</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="workspace">
        <header class="document-header">
          <div class="masthead">
            <div class="call-sheet-name">VIDEOFORGE — CALL SHEET</div>
            <div class="project-title-block">
              <span class="visually-hidden" id="project-kicker">NEW PRODUCTION</span>
              <h1 id="project-heading">Create a short film</h1>
            </div>
          </div>

          <nav class="stage-nav" aria-label="Production stages">
            <button class="stage-link active" data-view="concept">
              <span class="stage-index">1.</span><span>CONCEPT</span>
            </button>
            <button class="stage-link" data-view="plan">
              <span class="stage-index">2.</span><span>PLAN</span>
            </button>
            <button class="stage-link" data-view="storyboard">
              <span class="stage-index">3.</span><span>STORYBOARD</span>
            </button>
            <button class="stage-link" data-view="production">
              <span class="stage-index">4.</span><span>PRODUCTION</span>
            </button>
            <button class="stage-link" data-view="final">
              <span class="stage-index">5.</span><span>FINAL CUT</span>
            </button>
          </nav>

          <div class="topbar-meta" aria-label="Production metadata">
            <div class="meta-item"><span>STAGE:</span> <strong id="stage-label">DRAFT</strong></div>
            <span class="meta-separator" aria-hidden="true">·</span>
            <div class="meta-item"><span>SAVED:</span> <strong id="saved-label">—</strong></div>
            <span class="meta-separator" aria-hidden="true">·</span>
            <div class="budget-meter"><span>EST. BUDGET:</span> <strong id="budget-label">— CNY</strong></div>
            <span class="meta-separator" aria-hidden="true">·</span>
            <div class="provider-chip"><span>PROVIDER:</span> <strong id="provider-label">LOADING PROVIDER</strong></div>
          </div>
        </header>

        <div id="notice" class="notice" role="status" aria-live="polite"></div>
        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="alert"></div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
